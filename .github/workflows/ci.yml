name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-vm:
    name: Tests (VM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: compiler/package-lock.json

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install and build compiler
        working-directory: compiler
        run: |
          npm ci
          npm run build

      - name: Compiler tests
        working-directory: compiler
        run: npm test

      - name: VM build and tests
        working-directory: vm
        run: |
          zig build -Doptimize=ReleaseSafe
          zig build test

      - name: E2E scenarios
        run: ./scripts/run-e2e.sh

      - name: Kestrel unit tests (VM)
        run: ./scripts/kestrel test

  test-jvm:
    name: Tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: compiler/package-lock.json

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install and build compiler
        working-directory: compiler
        run: |
          npm ci
          npm run build

      - name: Build VM (shared build path for CLI)
        working-directory: vm
        run: zig build -Doptimize=ReleaseSafe

      - name: Build JVM runtime JAR
        working-directory: runtime/jvm
        run: ./build.sh

      - name: Kestrel unit tests (JVM)
        run: ./scripts/kestrel test --target jvm
