name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: compiler/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install and build compiler
        working-directory: compiler
        run: |
          npm ci
          npm run build

      - name: Compiler tests
        working-directory: compiler
        run: npm test

      - name: Build JVM runtime JAR
        working-directory: runtime/jvm
        run: ./build.sh

      - name: Bootstrap self-hosted compiler
        run: |
          set -euo pipefail
          ./scripts/build-bootstrap-jar.sh
          ./kestrel bootstrap
          ./kestrel status

      - name: E2E scenarios
        run: ./scripts/run-e2e.sh

      - name: Kestrel unit tests
        run: ./scripts/kestrel test

      # - name: Compiler bootstrap chain (self-hosted smoke)
      #   run: ./scripts/test-compiler-bootstrap --summary

      # - name: Bootstrap handoff gate
      #   run: |
      #     set -euo pipefail
      #     ./scripts/build-bootstrap-jar.sh
      #     ./kestrel bootstrap
      #     status_output="$(./kestrel status)"
      #     echo "$status_output"
      #     echo "$status_output" | grep -F "compiler mode: self-hosted" >/dev/null
      #     ./kestrel build hello.ks
      #     ./kestrel run hello.ks
      #     ./kestrel test --summary

      - name: Sample - expr
        run: ./kestrel run samples/expr.ks

      - name: Sample - lambda
        run: ./kestrel run samples/lambda.ks

      - name: Sample - life
        run: ./kestrel run samples/life.ks

      - name: Sample - mandelbrot
        run: ./kestrel run samples/mandelbrot.ks

      - name: Sample - primes
        run: ./kestrel run samples/primes.ks

      - name: Sample - quicksort
        run: ./kestrel run samples/quicksort.ks

      - name: Sample - word-count
        run: ./kestrel run samples/word-count.ks
