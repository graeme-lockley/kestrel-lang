name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: compiler/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install and build compiler
        working-directory: compiler
        run: |
          npm ci
          npm run build

      - name: Compiler tests
        working-directory: compiler
        run: npm test

      - name: Build JVM runtime JAR
        working-directory: runtime/jvm
        run: ./build.sh

      - name: E2E scenarios
        run: ./scripts/run-e2e.sh

      - name: Kestrel unit tests
        run: ./scripts/kestrel test

  perf-medium:
    name: Perf (medium confidence)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: compiler/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install and build compiler
        working-directory: compiler
        run: |
          npm ci
          npm run build

      - name: Build JVM runtime JAR
        working-directory: runtime/jvm
        run: ./build.sh

      - name: Float perf benchmark (medium confidence)
        run: ./kestrel run tests/perf/float/run.ks 125 3
